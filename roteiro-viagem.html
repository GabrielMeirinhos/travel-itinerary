<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roteiro da Viagem</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #ededeb;
      --bg-info: #e6f1fb;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252522;
        --bg-tertiary: #2c2c2a;
        --bg-info: #0c447c;
        --text-primary: #e8e8e4;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --text-info: #85b7eb;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .header {
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border);
      padding: 1.75rem 1.5rem 1.25rem;
    }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    .name-bar {
      background: var(--bg-secondary);
      border-bottom: 0.5px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .name-bar label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
    .name-bar input {
      font-size: 13px; padding: 5px 10px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 180px; outline: none;
    }
    .name-bar input:focus { border-color: #378add; box-shadow: 0 0 0 2px rgba(55,138,221,0.18); }

    .day-block { margin: 1.5rem; }

    .day-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
    }
    .day-badge {
      background: var(--bg-info); color: var(--text-info);
      font-size: 12px; font-weight: 500;
      padding: 4px 12px; border-radius: var(--radius-md);
    }
    .day-title { font-size: 18px; font-weight: 500; }

    .period-label {
      font-size: 12px; font-weight: 500; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 1rem 0 0.5rem; padding-left: 0.25rem;
    }

    .activity-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
    }
    .activity-text { font-size: 15px; line-height: 1.45; }

    .activity-votes {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; flex-wrap: wrap;
    }

    .vote-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent; cursor: pointer;
      font-size: 13px; color: var(--text-secondary);
      transition: background 0.12s;
    }
    .vote-btn:hover { background: var(--bg-secondary); }
    .vote-btn.active-up { background: #eaf3de; border-color: #639922; color: #3b6d11; }
    .vote-btn.active-down { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; }
    .vote-count { font-weight: 500; }

    .toggle-comments {
      font-size: 12px; color: var(--text-tertiary);
      cursor: pointer; background: none; border: none; padding: 0;
    }
    .toggle-comments:hover { color: var(--text-secondary); }

    .comment-list { margin-top: 8px; }
    .comment-item {
      font-size: 13px; color: var(--text-secondary);
      padding: 6px 10px; background: var(--bg-secondary);
      border-radius: var(--radius-md); margin-bottom: 4px;
      border-left: 2px solid var(--border-hover);
    }
    .comment-author { font-weight: 500; color: var(--text-primary); }

    .add-comment { display: flex; gap: 6px; margin-top: 6px; }
    .add-comment input {
      flex: 1; font-size: 13px; padding: 6px 10px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-primary); color: var(--text-primary); outline: none;
    }
    .add-comment input:focus { border-color: #378add; }
    .add-comment button {
      font-size: 12px; padding: 6px 12px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: transparent; color: var(--text-secondary); cursor: pointer;
    }
    .add-comment button:hover { background: var(--bg-secondary); }

    .objetivo {
      font-size: 12px; color: var(--text-info);
      background: var(--bg-info); border-radius: var(--radius-md);
      padding: 3px 10px; display: inline-block; margin-top: 0.5rem;
    }

    .add-activity-btn {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 0.75rem 1rem;
      border: 0.5px dashed var(--border-hover);
      border-radius: var(--radius-lg);
      background: transparent; color: var(--text-tertiary);
      cursor: pointer; font-size: 14px; margin-top: 0.25rem;
    }
    .add-activity-btn:hover { background: var(--bg-secondary); color: var(--text-secondary); }

    .add-form {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-lg);
      padding: 0.85rem 1rem; margin-bottom: 0.5rem;
    }
    .add-form input {
      width: 100%; font-size: 14px; padding: 8px 10px;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-primary); color: var(--text-primary);
      margin-bottom: 8px; outline: none;
    }
    .add-form input:focus { border-color: #378add; }
    .add-form-actions { display: flex; gap: 6px; }
    .btn-confirm {
      padding: 6px 16px; border-radius: var(--radius-md);
      border: 0.5px solid #378add; background: var(--bg-info);
      color: var(--text-info); cursor: pointer; font-size: 13px;
    }
    .btn-cancel {
      padding: 6px 12px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px;
    }

    .divider { height: 0.5px; background: var(--border); margin: 0.5rem 0; }
  </style>
</head>
<body>

<div class="header">
  <h1>Roteiro da viagem</h1>
  <p>Vote nas atividades, comente e sugira novas ideias</p>
</div>

<div class="name-bar">
  <label for="userName">Seu nome:</label>
  <input type="text" id="userName" placeholder="Ex: João" maxlength="20" autocomplete="off" />
</div>

<div id="roteiro"></div>

<script>
const state = {
  addingTo: null,
  showComments: {},
  roteiro: [
    {
      dia: 'Sexta-feira', badge: 'Dia 1',
      periodos: [
        { nome: 'Noite', objetivo: null, atividades: [
          { id: 'a1', texto: 'Jantar leve na fogueira (hambúrguer artesanal)', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'a2', texto: 'Primeira fogueira', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'a3', texto: 'Conversa tranquila + bebida', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]}
      ]
    },
    {
      dia: 'Sábado', badge: 'Dia 2',
      periodos: [
        { nome: 'Manhã / Tarde', objetivo: null, atividades: [
          { id: 'b1', texto: 'Passeio em São Benedito do Sul', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'b2', texto: 'Assistir ao pôr do sol (se tiver um bom ponto)', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]},
        { nome: 'Noite', objetivo: 'aproveitar o auge da viagem', atividades: [
          { id: 'b3', texto: 'Fondue', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'b4', texto: 'Bebidas + jogos (baralho, dinâmicas, etc.)', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'b5', texto: 'Fogueira + conversa', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]}
      ]
    },
    {
      dia: 'Domingo', badge: 'Dia 3',
      periodos: [
        { nome: 'Manhã', objetivo: null, atividades: [
          { id: 'c1', texto: 'Acordar sem pressa', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'c2', texto: 'Café da manhã tranquilo', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'c3', texto: 'Trilha leve', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]},
        { nome: 'Tarde', objetivo: null, atividades: [
          { id: 'c4', texto: 'Almoço: churrasco', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]},
        { nome: 'Noite', objetivo: 'misturar natureza + passeio', atividades: [
          { id: 'c5', texto: 'Jantar: pizza (feita por nós) ou sushi', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'c6', texto: 'Vinho', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'c7', texto: 'Jogos + conversa', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]}
      ]
    },
    {
      dia: 'Segunda-feira', badge: 'Dia 4',
      periodos: [
        { nome: 'Dia', objetivo: 'curtir fora + descansar à noite', atividades: [
          { id: 'd1', texto: 'Visita às cachoeiras de Gravatá', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'd2', texto: 'Almoço na cidade', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
          { id: 'd3', texto: 'Sessão de filmes/séries + pipoca + doces (Fini, etc.)', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]}
      ]
    },
    {
      dia: 'Terça-feira', badge: 'Dia 5',
      periodos: [
        { nome: 'Manhã', objetivo: null, atividades: [
          { id: 'e1', texto: 'Organização da casa + arrumar bagagens', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]},
        { nome: 'Antes de ir embora', objetivo: null, atividades: [
          { id: 'e2', texto: 'Parada no Rei da Coxinha', votos: { up: 0, down: 0, users: {} }, comentarios: [] },
        ]}
      ]
    }
  ]
};

function getActivity(id) {
  for (const dia of state.roteiro) {
    for (const p of dia.periodos) {
      const a = p.atividades.find(a => a.id === id);
      if (a) return { dia, periodo: p, atividade: a };
    }
  }
  return null;
}

function vote(id, tipo) {
  const nome = document.getElementById('userName').value.trim() || 'Anônimo';
  const result = getActivity(id);
  if (!result) return;
  const a = result.atividade;
  const prev = a.votos.users[nome];
  if (prev === tipo) {
    delete a.votos.users[nome];
    a.votos[tipo]--;
  } else {
    if (prev) a.votos[prev]--;
    a.votos.users[nome] = tipo;
    a.votos[tipo]++;
  }
  render();
}

function toggleComments(id) {
  state.showComments[id] = !state.showComments[id];
  render();
}

function addComment(id) {
  const input = document.getElementById('ci_' + id);
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) return;
  const nome = document.getElementById('userName').value.trim() || 'Anônimo';
  const result = getActivity(id);
  if (!result) return;
  result.atividade.comentarios.push({ autor: nome, texto });
  state.showComments[id] = true;
  render();
}

function showAddForm(key) {
  state.addingTo = key;
  render();
  setTimeout(() => { const el = document.getElementById('newact_' + key); if (el) el.focus(); }, 50);
}

function cancelAdd() {
  state.addingTo = null;
  render();
}

function confirmAdd(diaIdx, pIdx) {
  const key = diaIdx + '_' + pIdx;
  const input = document.getElementById('newact_' + key);
  if (!input) return;
  const texto = input.value.trim();
  if (!texto) return;
  const id = 'custom_' + Date.now();
  state.roteiro[diaIdx].periodos[pIdx].atividades.push({
    id, texto, votos: { up: 0, down: 0, users: {} }, comentarios: []
  });
  state.addingTo = null;
  render();
}

function activityHTML(a) {
  const nome = document.getElementById('userName')?.value.trim() || '';
  const userVote = nome ? a.votos.users[nome] : null;
  const showC = state.showComments[a.id];
  const totalComments = a.comentarios.length;

  const commentsHTML = showC ? `
    <div class="comment-list">
      ${a.comentarios.map(c =>
        `<div class="comment-item"><span class="comment-author">${c.autor}:</span> ${c.texto}</div>`
      ).join('')}
    </div>
    <div class="add-comment">
      <input type="text" id="ci_${a.id}" placeholder="Seu comentário..." maxlength="120"
        onkeydown="if(event.key==='Enter')addComment('${a.id}')" />
      <button onclick="addComment('${a.id}')">Enviar</button>
    </div>
  ` : '';

  return `<div class="activity-card">
    <div class="activity-text">${a.texto}</div>
    <div class="activity-votes">
      <button class="vote-btn ${userVote === 'up' ? 'active-up' : ''}" onclick="vote('${a.id}','up')">
        ✓ <span class="vote-count">${a.votos.up}</span>
      </button>
      <button class="vote-btn ${userVote === 'down' ? 'active-down' : ''}" onclick="vote('${a.id}','down')">
        ✕ <span class="vote-count">${a.votos.down}</span>
      </button>
      <button class="toggle-comments" onclick="toggleComments('${a.id}')">
        ${showC ? 'ocultar comentários' : `comentários (${totalComments})`}
      </button>
    </div>
    ${commentsHTML}
  </div>`;
}

function render() {
  const container = document.getElementById('roteiro');
  let html = '';

  state.roteiro.forEach((dia, diaIdx) => {
    html += `<div class="day-block">
      <div class="day-header">
        <span class="day-badge">${dia.badge}</span>
        <span class="day-title">${dia.dia}</span>
      </div>`;

    dia.periodos.forEach((p, pIdx) => {
      const key = diaIdx + '_' + pIdx;
      html += `<div class="period-label">${p.nome}</div>`;
      p.atividades.forEach(a => { html += activityHTML(a); });
      if (p.objetivo) html += `<div class="objetivo">Objetivo: ${p.objetivo}</div>`;

      if (state.addingTo === key) {
        html += `<div class="add-form">
          <input type="text" id="newact_${key}" placeholder="Descreva a atividade..." maxlength="100"
            onkeydown="if(event.key==='Enter')confirmAdd(${diaIdx},${pIdx})" />
          <div class="add-form-actions">
            <button class="btn-confirm" onclick="confirmAdd(${diaIdx},${pIdx})">Adicionar</button>
            <button class="btn-cancel" onclick="cancelAdd()">Cancelar</button>
          </div>
        </div>`;
      } else {
        html += `<button class="add-activity-btn" onclick="showAddForm('${key}')">+ sugerir atividade</button>`;
      }
    });

    html += `<div class="divider"></div></div>`;
  });

  container.innerHTML = html;
}

document.getElementById('userName').addEventListener('input', render);
render();
</script>
</body>
</html>
